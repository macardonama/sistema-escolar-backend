<div class="flex min-h-screen bg-gray-100">

  <app-sidebar />

  <div class="flex-1">

    <app-header />

    <div class="p-10">

      <h1 class="text-5xl font-bold text-blue-700 mb-8">
        Mi perfil
      </h1>

      <div class="grid grid-cols-12 gap-6">

        <!-- Perfil -->

        <div class="col-span-4 bg-white rounded-3xl shadow p-8">

          <div
            class="w-24 h-24 rounded-full bg-blue-100 flex items-center justify-center text-5xl font-bold text-blue-700 mb-6"
          >
            {{ usuario?.nombre?.charAt(0) }}
          </div>

          <h2 class="text-4xl font-bold text-gray-900">
            {{ usuario?.nombre }}
          </h2>

          <p class="mt-4 text-xl text-gray-600">
            Documento: —
          </p>

          <p class="mt-3 text-xl text-gray-600">
            Grupo: —
          </p>

          <div
            class="inline-block mt-6 px-5 py-2 rounded-full bg-green-100 text-green-700 font-semibold"
          >
            Activo
          </div>

        </div>

        <!-- Indicadores -->

        <div class="col-span-8">

          <div class="grid grid-cols-3 gap-6 mb-6">

            <div class="bg-white rounded-3xl shadow p-8">

              <p class="text-gray-500 font-semibold">
                Asistencia
              </p>

              <h2 class="text-5xl font-bold mt-4">
                86%
              </h2>

            </div>

            <div class="bg-white rounded-3xl shadow p-8">

              <p class="text-gray-500 font-semibold">
                Ausencias
              </p>

              <h2 class="text-5xl font-bold mt-4">
                3
              </h2>

            </div>

            <div class="bg-white rounded-3xl shadow p-8">

              <p class="text-gray-500 font-semibold">
                Observaciones
              </p>

              <h2 class="text-5xl font-bold mt-4">
                5
              </h2>

            </div>

          </div>

          <!-- Últimas observaciones -->

          <div class="bg-white rounded-3xl shadow p-8">

            <h2 class="text-3xl font-bold mb-8">
              Últimas observaciones
            </h2>

            <div class="flex items-center gap-4">

              <span
                class="bg-yellow-100 text-yellow-700 px-4 py-2 rounded-full font-semibold"
              >
                Individual
              </span>

              <span class="text-gray-700 text-lg">
                Participó activamente y entregó la actividad completa.
              </span>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
