<div class="flex min-h-screen bg-gray-100">

  <div [class.hidden]="!mostrarSidebar">

    <app-sidebar />

  </div>

  <div class="flex-1">

    <app-header
      (toggleSidebarEvent)="toggleSidebar()"
    />

    <div class="p-10">

      <div class="flex justify-between items-center mb-8">

        <h1 class="text-4xl font-bold text-blue-600">
          Grupos
        </h1>

        <button
          class="bg-blue-700 hover:bg-blue-800 text-white px-6 py-3 rounded-xl transition"
        >
          + Nuevo grupo
        </button>

      </div>

      <div class="bg-white rounded-2xl shadow overflow-hidden">

        <table class="w-full">

          <thead class="bg-blue-600 text-white">

            <tr>

              <th class="p-4 text-left">
                Nombre
              </th>

              <th class="p-4 text-left">
                Grado
              </th>

              <th class="p-4 text-left">
                Director
              </th>

              <th class="p-4 text-left">
                Estado
              </th>

              <th class="p-4 text-left">
                Acciones
              </th>

            </tr>

          </thead>

          <tbody>

            <tr
                *ngFor="let grupo of grupos"
                class="border-b"
            >

              <td class="p-4">
                {{ grupo.nombre }}
              </td>

              <td class="p-4">
                {{ grupo.grado }}
              </td>

              <td class="p-4">
                {{ grupo.director?.nombre }}
              </td>

              <td class="p-4">

                <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm">

                  Activo

                </span>

              </td>

              <td class="p-4 flex gap-3">

                <button
                  class="bg-blue-100 text-blue-700 px-4 py-2 rounded-lg"
                >
                  Editar
                </button>

                <button
                  class="bg-red-100 text-red-700 px-4 py-2 rounded-lg"
                >
                  Desactivar
                </button>

              </td>

            </tr>

          </tbody>

        </table>

      </div>

    </div>

  </div>

</div>
