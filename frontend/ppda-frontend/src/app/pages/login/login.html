<div class="min-h-screen flex bg-gray-100">

  <!-- PANEL IZQUIERDO -->

  <div class="hidden lg:flex w-1/2 bg-blue-700 text-white flex-col justify-center items-center p-16">

    <img
      src="/ppda.png"
      alt="PPDA"
      class="w-72 mb-8"
    />

    <h1 class="text-5xl font-bold text-center">
      PPDA
    </h1>

    <p class="mt-6 text-xl text-blue-100 text-center max-w-md leading-relaxed">

      Plataforma institucional para gestión académica,
      convivencia y seguimiento emocional estudiantil.

    </p>

  </div>

  <!-- PANEL DERECHO -->

  <div class="flex-1 flex justify-center items-center p-8">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-xl p-10">

      <div class="flex flex-col items-center mb-8">

        <img
          src="/ppda1.png"
          alt="PPDA"
          class="w-28 mb-4"
        />

        <h2 class="text-3xl font-bold text-gray-800">
          Iniciar sesión
        </h2>

        <p class="text-gray-500 mt-2 text-center">
          Ingresa con tus credenciales institucionales
        </p>

      </div>

      <form
        (ngSubmit)="login()"
        class="space-y-6"
      >

        <div>

          <label class="block mb-2 font-medium text-gray-700">
            Correo institucional
          </label>

          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="correo@institucion.edu"
            class="w-full p-4 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
          />

        </div>

        <div>

          <label class="block mb-2 font-medium text-gray-700">
            Contraseña
          </label>

          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="********"
            class="w-full p-4 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
          />

        </div>

        <button
          type="submit"
          class="w-full bg-blue-700 hover:bg-blue-800 text-white p-4 rounded-xl font-semibold transition"
        >
          Ingresar al sistema
        </button>

      </form>

    </div>

  </div>

</div>
